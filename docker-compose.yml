services:
  backend:
    build:
      context: ./backend
    container_name: hrtool-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://host.docker.internal:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
    volumes:
      - hrtool-data:/app/data
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: hrtool-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  hrtool-data:
